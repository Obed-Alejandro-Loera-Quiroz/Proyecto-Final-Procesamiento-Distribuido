version: '3.8'

services:
  kafka-nodo:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-cluster-nodo-${NODO_ID}
    env_file: .env
    restart: unless-stopped
    network_mode: "host" # Mapeo directo sobre las interfaces de Linux Mint
    environment:
      KAFKA_NODE_ID: ${NODO_ID}
      KAFKA_PROCESS_ROLES: 'broker,controller'
      
      # Comunicación KRaft unificada usando el puerto 9093
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@100.115.62.37:9093,2@100.123.126.75:9093,3@100.72.209.77:9093'
      
      # Se abren dos listeners: INTERNAL (puerto 9092 para brokers) y EXTERNAL (puerto 9094 para scripts de Python)
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093'
      
      # Cómo se anuncian dinámicamente según la IP de Tailscale del .env de cada quien
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://${LAPTOP_IP}:9092,EXTERNAL://${LAPTOP_IP}:9094'
      
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      
      CLUSTER_ID: '4L62YDgNTki3A6wV3lExlw=='
      KAFKA_CLUSTER_ID: '4L62YDgNTki3A6wV3lExlw=='
      
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_CONTROLLER_SNAPSHOT_CHUNKS_BYTES: 268435456
      KAFKA_LOG4J_LOGGERS: "kafka.controller=INFO,kafka.server=INFO,org.apache.kafka=WARN"
    volumes:
      - kafka-data:/var/lib/kafka/data

volumes:
  kafka-data: