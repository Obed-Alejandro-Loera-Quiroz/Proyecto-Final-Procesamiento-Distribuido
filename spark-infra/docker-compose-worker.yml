services:
  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker-nodo
    environment:
      - SPARK_MODE=worker
    ports:
      - "8081:8081" # Interfaz del worker para revisar su estado individual
    volumes:
      - ../shared-data:/opt/spark/shared-data
    networks:
      - spark-net
    # AQUÍ ESTÁ LA CORRECCIÓN: Le decimos que arranque como worker apuntando a tu Master
    command: /opt/spark/sbin/start-worker.sh spark://192.168.0.103:7077

networks:
  spark-net:
    driver: bridge