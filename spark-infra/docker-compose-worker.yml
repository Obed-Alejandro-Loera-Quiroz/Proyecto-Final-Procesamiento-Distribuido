version: "3.8"

services:
  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker-nodo-${NODO_ID}
    user: root
    network_mode: "host"
    restart: unless-stopped

    volumes:
      - ../shared-data:/opt/spark/shared-data

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      --host ${LAPTOP_IP}
      --webui-port 8081
      --cores 2
      --memory 2G
      spark://100.72.209.77:7077