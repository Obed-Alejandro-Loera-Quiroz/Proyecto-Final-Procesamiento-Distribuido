services:
  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker-nodo
    environment:
      - SPARK_MODE=worker
    ports:
      - "8081:8081"
    volumes:
      - ../shared-data:/opt/spark/shared-data
    networks:
      - spark-net
    # TRUCO REY: Lo mismo para que la laptop de Osvaldo y Pamela no lo tumben
    tty: true
    stdin_open: true
    command: /opt/spark/sbin/start-worker.sh spark://192.168.0.103:7077

networks:
  spark-net:
    driver: bridge