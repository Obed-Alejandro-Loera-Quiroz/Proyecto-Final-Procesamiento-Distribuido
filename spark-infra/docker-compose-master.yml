services:
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master-nodo-3
    environment:
      - SPARK_MODE=master
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ../shared-data:/opt/spark/shared-data
    networks:
      - spark-net
    # TRUCO REY: Forzamos a que mantenga una consola abierta para que no se apague solo
    tty: true
    stdin_open: true
    command: /opt/spark/sbin/start-master.sh

networks:
  spark-net:
    driver: bridge