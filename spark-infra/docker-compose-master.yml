services:
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master-nodo-3
    user: root  # Forzamos permisos de superusuario dentro de Docker
    environment:
      - SPARK_MODE=master
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ../shared-data:/opt/spark/shared-data
    networks:
      - spark-net
    # COMANDO DIRECTO DIRECTO SIN SCRIPTS SECUNDARIOS:
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master

networks:
  spark-net:
    driver: bridge