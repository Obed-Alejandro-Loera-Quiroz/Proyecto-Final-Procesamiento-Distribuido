version: "3.8"

services:
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master-nodo-3
    user: root
    network_mode: "host"
    restart: unless-stopped

    volumes:
      - ../shared-data:/opt/spark/shared-data
      - ../apps/spark-analysis:/opt/spark/apps

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
      --host 100.72.209.77
      --port 7077
      --webui-port 8080