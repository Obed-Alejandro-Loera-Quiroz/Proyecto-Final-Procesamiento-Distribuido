version: '3.8'

services:
  spark-master:
    image: bitnami/spark:3.5.1
    container_name: spark-master-nodo-3
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "7077:7077"   # Puerto interno de comunicación para los Workers
      - "8080:8080"   # Interfaz Web para que el Dr. Galván vea el clúster en vivo
    volumes:
      - ../shared-data:/opt/bitnami/spark/shared-data
    networks:
      - spark-net

networks:
  spark-net:
    driver: bridge